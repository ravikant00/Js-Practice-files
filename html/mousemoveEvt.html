<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mousemove Event</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        html,body{
            height: 100%;
            width: 100%;
            background-color: #222;
        }
        body{
            position: relative;
            overflow: hidden;
        }

        #abcd{
            position: absolute;
            transition: all cubic-bezier(0.19, 1, 0.22, 1) .2s;
            height: 100px;
            width: 100px;
            background-color: red;
        }
    </style>
</head>
<body>
    <div id="abcd">

    </div>

    <script src="../js/mousemove.js"></script>
</body>
</html>
