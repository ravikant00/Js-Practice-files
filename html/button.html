<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Button</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,body{
            height: 100%;
            width: 100%;

        }
        input{
            display: none;
        }
        #main{
            height: 100%;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #222;
        }
        #btn{
            padding: 10px 20px;
            border-radius: 8px; 
            background-color: rgb(18, 74, 55);
            color: white;
            font-weight: 500;
        }
        #btn:hover{
            background-color: rgb(15, 47, 36);
            color: whitesmoke;
        }

    </style>
</head>
<body>
    <div id="main">
        <input id="fileinp" type="file">
        <div id="btn">
            Upload File
        </div>
        
    </div>

    <script src="../js/button.js"></script>

</body>
</html>
