<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Download UI</title>
    <style>
      * {
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #667eea, #764ba2);
      }

      /* Glass Card */
      .card {
        width: 300px;
        padding: 20px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        color: white;
        text-align: center;
      }

      /* Progress bar */
      .progress-box {
        width: 100%;
        height: 10px;
        background: rgba(255, 255, 255, 0.3);
        border-radius: 20px;
        margin: 15px 0;
        overflow: hidden;
      }

      .progress {
        height: 100%;
        width: 12%;
        background: #00e0ff;
      }

    </style>
  </head>

  <body>
    <div class="card">
      <h3>Downloading</h3>

      <div class="progress-box">
        <div class="progress" id="progress"></div>
      </div>

      <p id="status">0%</p>

    </div>

    <script src="../js/setInterval.js"></script>
  </body>
</html>
